version: "3.9"

# ColdMail.ru — ports chosen to avoid conflicts with other containers on this VPS
# App: 4000, Frontend: 4001, Grafana: 4002, PG: 5440, Redis: 6382, Prometheus: 9092

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - app
    restart: unless-stopped

  worker-email:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/workers/email.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-warmup:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/workers/warmup.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-imap:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/workers/imap.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-ai:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/workers/ai.js
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coldmail
      POSTGRES_USER: coldmail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coldmail_secret_2026}
    volumes:
      - coldmail_postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldmail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - coldmail_redis_data:/data
    ports:
      - "6382:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - coldmail_prometheus_data:/prometheus
    ports:
      - "9092:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - coldmail_grafana_data:/var/lib/grafana
    ports:
      - "4002:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  coldmail_postgres_data:
  coldmail_redis_data:
  coldmail_prometheus_data:
  coldmail_grafana_data:
